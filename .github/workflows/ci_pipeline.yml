name: Enterprise QA & DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    # 1. Τρέχουμε σε Windows για να δουλέψουν τα .dll της C++
    runs-on: windows-latest 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: 3.9
        cache: 'pip'

    - name: Install Python Dependencies & QA Tools
      run: |
        python -m pip install --upgrade pip
        # Προτείνεται να υπάρχει requirements.txt, αλλιώς εγκαθιστούμε τα βασικά
        pip install requests flask pytest pytest-html bandit safety numpy pandas stable-baselines3
        
    # 2. Ασφάλεια Κώδικα (Static Analysis)
    - name: Security Check (Bandit)
      run: bandit -r testing/ -ll

    # 3. Compiling the C++ Core Engine
    - name: Build C++ Physics Engine (DLL)
      run: |
        # Ο g++ υπάρχει προεγκατεστημένος στα GitHub Windows Runners
        g++ -shared -o cpp_core_physics_engine/physics.dll cpp_core_physics_engine/physics_solver.cpp -fopenmp
      
    # 4. Τρέχουμε τα Unit Tests (Δεν θέλουν API, τρέχουν αστραπιαία)
    - name: Run Unit Tests (DB & C++ Core)
      run: |
        pytest testing/unit/ -v --html=reports/unit_report.html

    # 5. Σηκώνουμε το API στο παρασκήνιο (για να περάσουν τα Integration Tests)
    - name: Boot API Server (Background)
      run: |
        # Το Start-Process τρέχει το Flask API σε background thread
        Start-Process python -ArgumentList "api/server.py" -NoNewWindow
        # Περιμένουμε 10 δευτερόλεπτα να φορτώσει ο Server
        Start-Sleep -Seconds 10
        
    # 6. Τρέχουμε τα Integration Tests (Χτυπάνε το API που μόλις σηκώσαμε)
    - name: Run Integration Tests (API & LLM Logic)
      run: |
        pytest testing/integration/ -v --html=reports/integration_report.html

    # 7. Αποθηκεύουμε τα HTML Reports ακόμα και αν τα τεστ αποτύχουν
    - name: Upload QA HTML Reports
      uses: actions/upload-artifact@v4  # <--- Η ΜΟΝΑΔΙΚΗ ΑΛΛΑΓΗ (από v3 σε v4)
      if: always()
      with:
        name: QA-Test-Reports
        path: reports/