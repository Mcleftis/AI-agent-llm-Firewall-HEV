name: Enterprise QA & DevSecOps Pipeline
on: [push, pull_request]
jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Build C++ Core and Firewall
      run: |
        g++ -shared -o testing/unit/physics.dll cpp_core_physics_engine/physics_solver.cpp -fopenmp
        g++ -shared -o cpp_firewall/firewall.dll cpp_firewall/firewall.cpp
    - name: Run Unit Tests
      env:
        PYTHONPATH: .
      run: python -m pytest testing/unit/ -v --html=reports/unit_report.html
    - name: Boot API Server
      env:
        SECRET_KEY: "dummy"
        OLLAMA_URL: "http://127.0.0.1:11434"
        PYTHONPATH: .
      run: |
        Start-Process python -ArgumentList "api_server.py" -NoNewWindow
        Start-Sleep -Seconds 10
    - name: Run Integration Tests
      env:
        PYTHONPATH: .
      run: python -m pytest testing/integration/ -v --html=reports/integration_report.html
    - name: Upload QA HTML Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: QA-Test-Reports
        path: reports/
