name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  quality-assurance:
    name: Build & Test (Linux Target)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build C++ Core and Firewall (Linux Native)
        run: |
          # Compilation με τα νέα paths της αρχιτεκτονικής
          g++ -shared -fPIC -o testing/unit/physics.so cpp_core/physics_solver.cpp -fopenmp
          g++ -shared -fPIC -o cpp_core/cpp_firewall/firewall.so cpp_core/cpp_firewall/firewall.cpp

      - name: Run PyTest QA Suite
        env:
          PYTHONPATH: .
        run: python -m pytest testing/unit/ -v --html=reports/unit_report.html

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: QA-Test-Reports
          path: reports/

  build-and-push:
    name: Build & Push Container Image
    runs-on: ubuntu-latest
    needs: [quality-assurance] # ΑΥΣΤΗΡΟ DEPENDENCY - Δεν προχωράμε αν αποτύχει το QA
    if: github.ref == 'refs/heads/main' # Κάνουμε push μόνο από το main branch

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hev-ai-agent:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/hev-ai-agent:${{ github.sha }}