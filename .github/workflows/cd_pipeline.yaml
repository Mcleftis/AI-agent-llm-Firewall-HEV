name: Continuous Deployment (MLOps)

on:
  push:
    branches:
      - main
  # Επιτρέπει τη χειροκίνητη εκτέλεση του pipeline από το UI του GitHub
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Push AI Agent Docker Image
    runs-on: ubuntu-latest
    
    # Το CD τρέχει ΜΟΝΟ αν περάσουν πρώτα τα τεστ του CI (pytest)
    # Προϋποθέτει ότι το job στο ci_pipeline.yml λέγεται "test"
    # needs: [test] 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          # Τα credentials είναι κρυμμένα στα GitHub Secrets (Συνεργασία με Security/DevOps)
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hev-ai-agent:latest

      - name: Verify Deployment
        run: echo "Deployment to Container Registry completed successfully. The HEV edge device can now pull the latest image."