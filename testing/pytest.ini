[pytest]
# Ορίζουμε τον φάκελο που βρίσκονται τα τεστ για να μην ψάχνει άσκοπα σε όλο το repo
testpaths = testing

# Strict markers: Αν κάποιος γράψει λάθος ένα marker (π.χ. @pytest.mark.uui αντί για ui), το τεστ θα σκάσει αμέσως
addopts = --strict-markers -v

markers =
    unit: Fast isolated tests (DB logs, pure Python logic)
    integration: Boundary tests (C++ Firewall Bridge, Neurosymbolic logic with Mocks)
    api: Backend FastAPI endpoints & WAF Security middleware tests
    ui: Streamlit Headless E2E tests via AppTest (Fast)
    smoke: ML Artifact execution tests (PPO Agent step validation)